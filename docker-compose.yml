version: '3.8'

services:
  ecommerce-api:
    build: .
    container_name: ecommerce-chat-ia
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./ecommerce.db
      - GEMINI_API_KEY=sk-test-key
      - ENVIRONMENT=production
    volumes:
      - ./ecommerce.db:/app/ecommerce.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s